name: docker

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/xiaochen201807/mouyin-server

jobs:
  build:
    name: build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="main"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and push native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: publish manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="main"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish multi-architecture manifests
        shell: bash
        run: |
          image="${IMAGE_NAME}"
          version="${{ steps.vars.outputs.version }}"

          docker buildx imagetools create \
            -t "${image}:${version}" \
            "${image}:${version}-amd64" \
            "${image}:${version}-arm64"

          docker buildx imagetools create \
            -t "${image}:${GITHUB_SHA}" \
            "${image}:${GITHUB_SHA}-amd64" \
            "${image}:${GITHUB_SHA}-arm64"

          docker buildx imagetools create \
            -t "${image}:latest" \
            "${image}:${version}-amd64" \
            "${image}:${version}-arm64"

      - name: Add pull commands to summary
        shell: bash
        run: |
          image="${IMAGE_NAME}"
          version="${{ steps.vars.outputs.version }}"
          {
            echo "## Docker image"
            echo ""
            echo "Published multi-architecture image manifests for \`linux/amd64\` and \`linux/arm64\`."
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${image}:${version}"
            echo "docker pull ${image}:latest"
            echo "docker pull ${image}:${GITHUB_SHA}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
