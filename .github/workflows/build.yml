name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/mouyin-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./cmd/mouyin-server

      - name: Add build summary
        run: |
          echo "## Build output" >> "$GITHUB_STEP_SUMMARY"
          echo "Built: \`mouyin-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow does not use actions/upload-artifact because the account artifact quota is full." >> "$GITHUB_STEP_SUMMARY"
          echo "Create a tag like \`v0.1.0\` to publish binaries directly to GitHub Releases." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload binary to GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Automated build for $TAG_NAME" || true
          gh release upload "$TAG_NAME" dist/* --clobber
